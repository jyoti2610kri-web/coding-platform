<!DOCTYPE html>
<html>
<head>
<title>Coding Practice</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Coding Practice Platform</h1>

<a href="login.html">
<button>Login</button>
</a>

<a href="dashboard.html">
<button>Practice Problems</button>
</a>

<h2>Leaderboard</h2>
<div id="leaderboard"></div>

<script>
fetch("https://coding-platform-backend-azwo.onrender.com/leaderboard")
.then(res => res.json())
.then(data => {
    let html="";
    data.forEach(user=>{
        html += `<p>${user.username} - ${user.solved} problems</p>`;
    });
    document.getElementById("leaderboard").innerHTML = html;
});
</script>

</body>
</html>
