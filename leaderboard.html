<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>
</head>

<body>

<h1>🏆 Coding Platform Leaderboard</h1>

<div id="leaderboard"></div>

<script>
fetch("https://coding-platform-backend-azwo.onrender.com/leaderboard")
.then(res => res.json())
.then(data => {
    let html="";
    data.forEach(user=>{
        html += `<p>${user.username} - ${user.solved} problems</p>`;
    });
    document.getElementById("leaderboard").innerHTML = html;
});
</script>

</body>
</html>
